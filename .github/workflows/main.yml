name: Update Profile Components

on:
  # Run every 12 hours to keep it fresh
  schedule:
    - cron: "0 */12 * * *"
  
  # Run on every push to the main branch
  push:
    branches:
      - main
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generate the snake animation
      - name: Generate GitHub Contribution Grid Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Push the generated files to the output branch
      - name: Push Snake Animation to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  daily-log:
    runs-on: ubuntu-latest
    # Only run daily log on schedule or manual trigger to avoid spamming on every push
    # Or run it on push if they want "as soon as I did it" to count an extra automated log?
    # Actually, if they push, they ALREADY have a commit, so they don't need an automated one for the streak.
    # The streak only needs ONE commit per day.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate Daily Log
        run: python scripts/generate_daily_log.py

      - name: Commit and Push Daily Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git commit -m "docs: automated daily log for $(date +'%Y-%m-%d') 🚀" || echo "No changes to commit"
          git push
